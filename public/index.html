<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Car Tracker</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #e5f0ff;
      color: #003366;
      padding: 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 960px;
      margin: 0 auto;
    }

    h1 {
      text-align: center;
      margin-bottom: 28px;
      color: #003366;
      font-size: 28px;
      font-weight: 700;
    }

    /* --- Top bar: car select + name + add car --- */
    .top-bar {
      background: #ffffff;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 24px;
      box-shadow: 0 1px 4px rgba(0,51,102,0.08);
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .field label {
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #003366;
      opacity: 0.7;
    }

    .field select,
    .field input {
      padding: 10px 14px;
      border: 2px solid #d0dce8;
      border-radius: 8px;
      font-size: 14px;
      color: #003366;
      background: #ffffff;
      outline: none;
      transition: border-color 0.15s;
    }

    .field select:focus,
    .field input:focus {
      border-color: #3c66fa;
    }

    .field select {
      min-width: 160px;
      cursor: pointer;
    }

    .field.grow {
      flex: 1;
      min-width: 0;
    }

    .field.grow select,
    .field.grow input {
      width: 100%;
    }

    .field input {
      width: 140px;
    }

    .top-bar .divider {
      width: 1px;
      height: 36px;
      background: #d0dce8;
      align-self: flex-end;
      margin: 0 4px;
    }

    .add-car-group {
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }

    .btn {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      transition: background 0.15s, opacity 0.15s;
    }

    .btn-primary {
      background: #3c66fa;
      color: #ffffff;
    }
    .btn-primary:hover { background: #2b52d4; }

    .btn-outline {
      background: none;
      border: 2px solid #3c66fa;
      color: #3c66fa;
    }
    .btn-outline:hover { background: #e5f0ff; }

    .btn-remove-car {
      background: none;
      border: 2px solid #d0dce8;
      border-radius: 8px;
      color: #003366;
      opacity: 0.4;
      font-size: 18px;
      padding: 6px 10px;
      cursor: pointer;
      align-self: flex-end;
      transition: opacity 0.15s, color 0.15s, border-color 0.15s;
      display: none;
    }
    .btn-remove-car.visible {
      display: inline-block;
    }
    .btn-remove-car:hover {
      opacity: 1;
      color: #d9534f;
      border-color: #d9534f;
    }

    .btn-danger-sm {
      background: none;
      border: none;
      color: #003366;
      opacity: 0.35;
      font-size: 16px;
      padding: 4px 8px;
      cursor: pointer;
      transition: opacity 0.15s, color 0.15s;
    }
    .btn-danger-sm:hover { opacity: 1; color: #d9534f; }

    /* --- Week navigation --- */
    .week-nav {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .week-nav button {
      background: #ffffff;
      border: 2px solid #d0dce8;
      border-radius: 8px;
      padding: 8px 16px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #003366;
      transition: border-color 0.15s, background 0.15s;
    }
    .week-nav button:hover { border-color: #3c66fa; background: #e5f0ff; }
    .week-nav button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .week-nav button:disabled:hover {
      border-color: #d0dce8;
      background: #ffffff;
    }

    .week-nav .week-label {
      font-size: 16px;
      font-weight: 600;
      color: #003366;
      min-width: 260px;
      text-align: center;
    }

    /* --- Week grid --- */
    .week-grid {
      background: #ffffff;
      border-radius: 12px;
      box-shadow: 0 1px 4px rgba(0,51,102,0.08);
      overflow: hidden;
    }

    .week-grid table {
      width: 100%;
      border-collapse: collapse;
    }

    .week-grid th {
      background: #003366;
      color: #ffffff;
      padding: 12px 8px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
    }

    .week-grid th:first-child {
      text-align: left;
      padding-left: 16px;
      width: 70px;
    }

    .week-grid th .day-date {
      display: block;
      font-weight: 400;
      font-size: 11px;
      opacity: 0.7;
      margin-top: 2px;
    }

    .week-grid td {
      border: 1px solid #e8eff5;
      padding: 0;
      text-align: center;
      height: 36px;
      vertical-align: middle;
      position: relative;
    }

    .week-grid tr:nth-child(even) td {
      background: #f7faff;
    }

    .week-grid td:first-child {
      text-align: right;
      padding: 4px 10px;
      font-weight: 600;
      font-size: 12px;
      color: #003366;
      opacity: 0.6;
      background: #e5f0ff !important;
      border-right: 2px solid #d0dce8;
      white-space: nowrap;
    }

    .week-grid td.cell-empty {
      cursor: pointer;
      transition: background 0.12s;
    }

    .week-grid td.cell-empty:hover {
      background: #e5f0ff;
    }

    .week-grid td.cell-empty.cell-active:hover {
      background: #d0e0ff;
    }

    .week-grid td.cell-reserved {
      background: #3c66fa !important;
      color: #ffffff;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.12s;
    }

    .week-grid td.cell-reserved:hover {
      background: #2b52d4 !important;
    }

    .week-grid td.cell-today {
      box-shadow: inset 0 -3px 0 0 #3c66fa;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #003366;
      opacity: 0.5;
      font-size: 15px;
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #003366;
      color: #ffffff;
      padding: 12px 24px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      opacity: 0;
      transition: transform 0.3s, opacity 0.3s;
      z-index: 100;
      pointer-events: none;
    }

    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }

    @media (max-width: 700px) {
      body { padding: 12px; }
      .top-bar { flex-direction: column; align-items: stretch; }
      .top-bar .divider { display: none; }
      .field select, .field input { width: 100%; min-width: 0; }
      .add-car-group { flex-direction: row; }
      .week-nav .week-label { font-size: 14px; min-width: auto; }
      .week-grid th, .week-grid td { padding: 6px 4px; font-size: 12px; }
      .week-grid td:first-child { padding: 6px 8px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Company Car Tracker</h1>

    <!-- Top bar -->
    <div class="top-bar">
      <div class="field grow">
        <label>Car</label>
        <select id="carSelect">
          <option value="">-- Select a car --</option>
        </select>
      </div>
      <button class="btn btn-remove-car" id="removeCarBtn" onclick="removeSelectedCar()" title="Remove selected car">&times;</button>
      <div class="field">
        <label>Your name</label>
        <input type="text" id="nameInput" placeholder="e.g. Karel" />
      </div>
      <div class="divider"></div>
      <div class="add-car-group">
        <div class="field">
          <label>New car</label>
          <input type="text" id="newPlate" placeholder="e.g. AB-123-CD" />
        </div>
        <button class="btn btn-outline" onclick="addCar()">+ Add</button>
      </div>
    </div>

    <!-- Week navigation -->
    <div class="week-nav">
      <button id="prevWeek" onclick="changeWeek(-1)">&larr; Previous</button>
      <span class="week-label" id="weekLabel"></span>
      <button id="nextWeek" onclick="changeWeek(1)">Next &rarr;</button>
    </div>

    <!-- Week grid -->
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // --- State ---
    let cars = [];
    let reservations = [];
    let weekOffset = 0; // 0 = this week, 1 = next week

    // --- Date helpers ---
    function getMonday(d) {
      const date = new Date(d);
      const day = date.getDay();
      const diff = date.getDate() - day + (day === 0 ? -6 : 1);
      date.setDate(diff);
      date.setHours(0, 0, 0, 0);
      return date;
    }

    function addDays(d, n) {
      const r = new Date(d);
      r.setDate(r.getDate() + n);
      return r;
    }

    function fmtDate(d) {
      return d.toISOString().slice(0, 10);
    }

    function fmtShort(d) {
      return d.toLocaleDateString("en-US", { month: "short", day: "numeric" });
    }

    function fmtDayNum(d) {
      return d.getDate();
    }

    function getWeekDates() {
      const monday = getMonday(new Date());
      const shifted = addDays(monday, weekOffset * 7);
      return Array.from({ length: 7 }, (_, i) => addDays(shifted, i));
    }

    function isToday(d) {
      const t = new Date();
      return d.getFullYear() === t.getFullYear() &&
             d.getMonth() === t.getMonth() &&
             d.getDate() === t.getDate();
    }

    const DAY_NAMES = ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"];
    const HOURS = Array.from({ length: 15 }, (_, i) => 8 + i); // 8..22

    // --- API ---
    async function loadCars() {
      const res = await fetch("/api/cars");
      cars = await res.json();
      renderCarSelect();
    }

    async function loadReservations() {
      const dates = getWeekDates();
      const from = fmtDate(dates[0]);
      const to = fmtDate(dates[6]);
      try {
        const res = await fetch(`/api/reservations?from=${from}&to=${to}`);
        if (res.ok) {
          reservations = await res.json();
        } else {
          reservations = [];
        }
      } catch {
        reservations = [];
      }
    }

    async function addCar() {
      const input = document.getElementById("newPlate");
      const plate = input.value.trim();
      if (!plate) { input.focus(); return; }

      const res = await fetch("/api/cars", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ plate })
      });

      if (res.ok) {
        cars = await res.json();
        input.value = "";
        renderCarSelect();
        renderGrid();
        showToast("Car added");
      } else {
        const err = await res.json();
        showToast(err.error);
      }
    }

    function removeSelectedCar() {
      const plate = document.getElementById("carSelect").value;
      if (plate) removeCar(plate);
    }

    function updateRemoveBtn() {
      const btn = document.getElementById("removeCarBtn");
      const selected = document.getElementById("carSelect").value;
      btn.classList.toggle("visible", !!selected);
    }

    async function removeCar(plate) {
      if (!confirm(`Remove car ${plate} and all its reservations?`)) return;

      const res = await fetch(`/api/cars/${encodeURIComponent(plate)}`, {
        method: "DELETE"
      });

      if (res.ok) {
        cars = await res.json();
        renderCarSelect();
        await loadReservations();
        renderGrid();
        showToast("Car removed");
      }
    }

    async function makeReservation(plate, date, hour) {
      const name = document.getElementById("nameInput").value.trim();
      if (!name) {
        showToast("Enter your name first");
        document.getElementById("nameInput").focus();
        return;
      }

      const res = await fetch("/api/reservations", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ plate, name, date, hour })
      });

      if (res.ok) {
        await loadReservations();
        renderGrid();
        showToast(`Reserved ${plate} at ${hour}:00`);
      } else {
        const err = await res.json();
        showToast(err.error);
      }
    }

    async function cancelReservation(id, plate, name) {
      if (!confirm(`Cancel reservation for ${name} on ${plate}?`)) return;

      const res = await fetch(`/api/reservations/${id}`, {
        method: "DELETE"
      });

      if (res.ok) {
        await loadReservations();
        renderGrid();
        showToast("Reservation cancelled");
      }
    }

    // --- Rendering ---
    function renderCarSelect() {
      const select = document.getElementById("carSelect");
      const current = select.value;
      select.innerHTML = '<option value="">-- Select a car --</option>' +
        cars.map(p => `<option value="${esc(p)}">${esc(p)}</option>`).join("");
      if (cars.includes(current)) select.value = current;
      updateRemoveBtn();
    }

    function renderGrid() {
      const grid = document.getElementById("weekGrid");
      const dates = getWeekDates();
      const selectedCar = document.getElementById("carSelect").value;

      if (cars.length === 0) {
        grid.innerHTML = '<div class="empty-state">No cars added yet. Add a license plate above to get started.</div>';
        return;
      }

      if (!selectedCar) {
        grid.innerHTML = '<div class="empty-state">Select a car above to view its schedule.</div>';
        return;
      }

      // Build lookup: "date|hour" -> reservation (filtered to selected car)
      const lookup = {};
      reservations.forEach(r => {
        if (r.plate === selectedCar) {
          lookup[`${r.date}|${r.hour}`] = r;
        }
      });

      let html = "<table><thead><tr><th></th>";
      dates.forEach((d, i) => {
        html += `<th>${DAY_NAMES[i]}<span class="day-date">${fmtDayNum(d)}/${d.getMonth() + 1}</span></th>`;
      });
      html += "</tr></thead><tbody>";

      HOURS.forEach(hour => {
        html += "<tr>";
        html += `<td>${String(hour).padStart(2, "0")}:00</td>`;

        dates.forEach(d => {
          const dateStr = fmtDate(d);
          const key = `${dateStr}|${hour}`;
          const r = lookup[key];
          const today = isToday(d);
          const todayClass = today ? " cell-today" : "";

          if (r) {
            html += `<td class="cell-reserved${todayClass}" onclick="cancelReservation(${r.id}, '${esc(selectedCar)}', '${esc(r.name)}')" title="Click to cancel">${esc(r.name)}</td>`;
          } else {
            html += `<td class="cell-empty cell-active${todayClass}" onclick="cellClick('${dateStr}', ${hour})" title="Click to reserve"></td>`;
          }
        });

        html += "</tr>";
      });

      html += "</tbody></table>";
      grid.innerHTML = html;
    }

    function cellClick(date, hour) {
      const plate = document.getElementById("carSelect").value;
      if (!plate) return;
      makeReservation(plate, date, hour);
    }

    function updateWeekLabel() {
      const dates = getWeekDates();
      const label = `${fmtShort(dates[0])} — ${fmtShort(dates[6])}`;
      document.getElementById("weekLabel").textContent = label;

      document.getElementById("prevWeek").disabled = weekOffset <= 0;
      document.getElementById("nextWeek").disabled = weekOffset >= 1;
    }

    async function changeWeek(dir) {
      const newOffset = weekOffset + dir;
      if (newOffset < 0 || newOffset > 1) return;
      weekOffset = newOffset;
      updateWeekLabel();
      await loadReservations();
      renderGrid();
    }

    // --- Toast ---
    function showToast(msg) {
      const el = document.getElementById("toast");
      el.textContent = msg;
      el.classList.add("show");
      clearTimeout(el._timeout);
      el._timeout = setTimeout(() => el.classList.remove("show"), 2500);
    }

    // --- Util ---
    function esc(str) {
      const d = document.createElement("div");
      d.textContent = str;
      return d.innerHTML;
    }

    // --- Init ---
    async function init() {
      await loadCars();
      updateWeekLabel();
      await loadReservations();
      renderGrid();

      // Re-render grid when car selection changes
      document.getElementById("carSelect").addEventListener("change", () => {
        updateRemoveBtn();
        renderGrid();
      });
    }

    init();
    // Auto-refresh every 15 seconds
    setInterval(async () => {
      await loadCars();
      await loadReservations();
      renderGrid();
    }, 15000);
  </script>
</body>
</html>
